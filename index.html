<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para ti ❤️</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background-color: #fef0f5;
            font-family: 'Arial', sans-serif;
        }
        .nombre {
            font-size: 45px;
            color: #e91e63;
            font-weight: bold;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }
        .corazon {
            font-size: 80px;
            color: #ff4081;
            animation: latido 1.5s infinite;
            margin: 25px 0;
        }
        .frase {
            font-size: 24px;
            color: #ad1457;
            text-align: center;
            max-width: 80%;
            line-height: 1.6;
        }
        @keyframes latido {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>
    <div class="nombre"> liz </div>
    <div class="corazon">❤️</div>
    <div class="frase">
        en serio diculpame, ya no estes asi<br>
        me importas mucho, dame una chanse...<br>
        Eres una persona muy especial para mí, LA QUIERO
    </div>
</body>
</html>
